# Prometheus: scrape del core-api Genesis (Bearer = GENESIS_PROMETHEUS_SCRAPE_TOKEN).
# Guardar el token en un archivo con permisos restrictivos, p. ej. /etc/prometheus/secrets/genesis_bearer_token

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: genesis-core-api
    metrics_path: /api/metrics/genesis
    scheme: https
    bearer_token_file: /etc/prometheus/secrets/genesis_bearer_token
    static_configs:
      - targets:
          - api.tudominio.com:443
    tls_config:
      insecure_skip_verify: false
